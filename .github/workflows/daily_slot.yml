name: daily-slot

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

concurrency:
  group: daily-slot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install ".[dev]"
      - run: python scripts/run_daily_slot.py
        env:
          STATE_DIR: state
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_OWNER_CHAT_ID: ${{ secrets.TELEGRAM_OWNER_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/
          if ! git diff --cached --quiet; then
            git commit -m "chore: update bot state after daily slot"
            git pull --rebase origin "${{ github.ref_name }}" || exit 1
            git push origin HEAD:${{ github.ref_name }}
          fi
